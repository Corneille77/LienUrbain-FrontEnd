<div class="p-4 mb-4 bg-light rounded-3 shadow-sm border-start border-primary border-5">
  <div class="container-fluid py-2 text-center">
    <h1 class="display-5 fw-bold text-primary">Catalogue des Voisins</h1>
    <p class="fs-5 text-muted">Lien Urbain : L'entraide à portée de main.</p>
  </div>
  
  <div class="mt-3 px-3">
    <input type="text" 
           class="form-control form-control-lg shadow-sm" 
           [(ngModel)]="recherche" 
           placeholder="🔍 Rechercher un service (ex: guitare, courses...)" />
  </div>
</div>

<div class="card mb-5 shadow-sm border-primary">
  <div class="card-header bg-primary text-white">
    <h5 class="mb-0">✨ Proposer un nouveau service</h5>
  </div>
  <div class="card-body bg-light">
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label small fw-bold">Quoi ?</label>
        <input type="text" class="form-control" placeholder="Ex: Jardinage" [(ngModel)]="nouvelleAnnonce.titre">
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-bold">Catégorie</label>
        <select class="form-select" [(ngModel)]="nouvelleAnnonce.categorie">
          <option value="Service">Service</option>
          <option value="Loisir">Loisir</option>
          <option value="Animaux">Animaux</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label small fw-bold">Détails</label>
        <input type="text" class="form-control" placeholder="Description courte..." [(ngModel)]="nouvelleAnnonce.description">
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-success w-100 fw-bold" (click)="ajouterAnnonce()">🚀 Publier</button>
      </div>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-md-4 mb-4" *ngFor="let item of annonces">
    <div class="card h-100 shadow-sm border-0">
      <div class="card-header bg-{{item.couleur}} text-white fw-bold">
        {{item.categorie}}
      </div>
      <div class="card-body">
        <h4 class="card-title h5 text-dark">{{item.titre}}</h4>
        <p class="card-text text-muted small">{{item.description}}</p>
      </div>
      <div class="card-footer bg-transparent border-0 d-flex justify-content-between align-items-center">
        <span class="badge rounded-pill bg-light text-dark border">👤 {{item.auteur}}</span>
        <button class="btn btn-sm btn-{{item.couleur}} px-3">Contacter</button>
      </div>
    </div>
  </div>
  
  <div class="col-12 text-center py-5" *ngIf="annonces.length === 0">
    <h4 class="text-muted">Désolé, aucune annonce ne correspond à "{{recherche}}" 😕</h4>
  </div>
</div>
