<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg p-4" style="width: 100%; max-width: 500px; border-radius: 20px;">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary">Créer un compte</h2>
      <p class="text-muted">Rejoignez vos voisins sur Lien Urbain !</p>
    </div>

    <form (ngSubmit)="onRegister()">
      <div class="mb-3">
        <label class="form-label fw-bold">Nom complet</label>
        <input type="text" class="form-control form-control-lg bg-light border-0" 
               name="nom" [(ngModel)]="nom" placeholder="Jean Dupont" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Email</label>
        <input type="email" class="form-control form-control-lg bg-light border-0" 
               name="email" [(ngModel)]="email" placeholder="nom@exemple.com" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Mot de passe</label>
        <input type="password" class="form-control form-control-lg bg-light border-0" 
               name="password" [(ngModel)]="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm mt-3" style="border-radius: 15px;">
        S'inscrire
      </button>

      <div class="text-center mt-4">
        <p>Déjà membre ? <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Connectez-vous</a></p>
      </div>
    </form>
  </div>
</div>
